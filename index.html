<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能流动批改扣分器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 禁用移动端长按选择文本和系统菜单，确保长按手势流畅 */
        .grid-cell {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col font-sans selection:bg-transparent">

    <div id="app" class="w-full max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-lg relative">
        
        <div id="config-view" class="flex flex-col flex-1 p-4 space-y-4">
            <h1 class="text-xl font-bold text-center text-blue-600 py-2">⚙️ 扣分器全局配置</h1>
            
            <div class="bg-gray-50 p-4 rounded-xl space-y-3 border border-gray-200">
                <h2 class="text-sm font-semibold text-gray-500">基础考试信息</h2>
                <div class="flex justify-between items-center bg-white p-2 rounded-lg border border-gray-200">
                    <span class="text-sm">考试参考总分</span>
                    <input type="number" id="input-total-score" value="100" class="text-right w-24 outline-none text-blue-600 font-medium" onfocus="this.value=''" oninput="updateQuestionArray()">
                </div>
                <div class="flex justify-between items-center bg-white p-2 rounded-lg border border-gray-200">
                    <span class="text-sm">题目总数</span>
                    <input type="number" id="input-question-count" value="20" class="text-right w-24 outline-none text-blue-600 font-medium" onfocus="this.value=''" oninput="updateQuestionArray()">
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl space-y-2 border border-gray-200">
                <h2 class="text-sm font-semibold text-gray-500">分段扣分快捷键 (英文逗号分隔)</h2>
                <input type="text" id="input-deductions" value="0.5, 1, 2, 3, 5" class="w-full p-2 rounded-lg border border-gray-200 outline-none text-blue-600 font-medium text-sm" onfocus="this.value=''" onchange="parseShortcuts()">
            </div>

            <div class="bg-gray-50 p-4 rounded-xl space-y-3 border border-gray-200">
                <h2 class="text-sm font-semibold text-gray-500">批量快速配置工具</h2>
                <div class="flex items-center space-x-2 text-sm">
                    <span>第</span>
                    <input type="number" id="batch-start" value="1" class="w-12 text-center p-1 border rounded" onfocus="this.value=''">
                    <span>至</span>
                    <input type="number" id="batch-end" value="10" class="w-12 text-center p-1 border rounded" onfocus="this.value=''">
                    <span>题，设为</span>
                    <input type="number" step="0.1" id="batch-score" value="3.0" class="w-16 text-center p-1 border rounded text-blue-600 font-bold" onfocus="this.value=''">
                    <span>分</span>
                </div>
                <button onclick="applyBatchScore()" class="w-full bg-blue-500 text-white py-2 rounded-lg text-sm font-bold active:bg-blue-600 transition">将规则应用到明细</button>
            </div>

            <div class="flex-1 flex flex-col min-h-[200px]">
                <h2 class="text-sm font-semibold text-gray-500 mb-2">题目分值明细清单</h2>
                <div id="detail-list" class="flex-1 overflow-y-auto max-h-[300px] border border-gray-200 rounded-xl p-2 space-y-2 bg-gray-50">
                    </div>
            </div>

            <button onclick="switchView(true)" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-base shadow-md active:bg-blue-700 transition">生成移动智能记分板</button>
        </div>

        <div id="grading-view" class="hidden flex flex-col flex-1">
            <div class="bg-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center border-b border-gray-200">
                <div>
                    <div class="text-xs text-gray-400 font-medium">当前实时得分</div>
                    <div class="flex items-baseline space-x-1">
                        <span id="display-current-score" class="text-4xl font-bold text-gray-900 font-mono">100.0</span>
                        <span id="display-total-score" class="text-sm text-gray-500 font-medium">/ 100</span>
                    </div>
                </div>
                <div class="text-right flex flex-col items-end space-y-2">
                    <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded">点击:全扣/恢复 | 长按:微调</span>
                    <button onclick="resetAllGrading()" class="text-xs font-semibold text-red-500 border border-red-200 px-3 py-1.5 rounded-lg active:bg-red-50 transition">重置面板</button>
                </div>
            </div>

            <div class="flex-1 p-4 overflow-y-auto bg-gray-50">
                <div id="grid-container" class="grid grid-cols-4 gap-3">
                    </div>
            </div>

            <div class="p-3 bg-white border-t border-gray-200 sticky bottom-0">
                <button onclick="switchView(false)" class="w-full text-center py-2 text-sm font-semibold text-blue-600 bg-blue-50 rounded-xl active:bg-blue-100 transition">⬅ 返回修改题目分值配置</button>
            </div>
        </div>

        <div id="adjust-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center transition-opacity">
            <div class="bg-white w-full max-w-md rounded-t-2xl p-5 space-y-4 animate-slide-up shadow-2xl">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 id="modal-title" class="text-base font-bold text-gray-800">第 X 题 快捷微调</h3>
                    <button onclick="closeModal()" class="text-gray-400 text-xl font-bold px-2">✕</button>
                </div>
                <div id="modal-shortcuts" class="grid grid-cols-3 gap-2">
                    </div>
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-lg border">
                    <span class="text-sm font-medium text-gray-600">精确输入自定义扣分:</span>
                    <div class="flex items-center space-x-1">
                        <input type="number" step="0.1" id="modal-custom-input" class="w-20 text-center bg-white border p-1 rounded outline-none text-red-500 font-bold" placeholder="分值" onfocus="this.value=''">
                        <button onclick="applyCustomDeduction()" class="bg-red-500 text-white px-3 py-1 rounded text-xs font-bold active:bg-red-600">扣除</button>
                    </div>
                </div>
                <button onclick="clearSingleQuestion()" class="w-full bg-gray-100 text-red-600 font-bold py-2.5 rounded-xl text-sm active:bg-gray-200 transition">一键恢复满分</button>
            </div>
        </div>

    </div>

    <script>
        // --- 核心全局状态 ---
        let state = {
            isConfigured: false,
            totalScore: 100,
            questionCount: 20,
            deductionOptions: [0.5, 1.0, 2.0, 3.0, 5.0],
            questions: [] // 元素结构: { number, maxScore, isFullyDeducted, deductionStates: [], customDeduction }
        };

        let activeModalIndex = null; // 当前正在弹窗修改的题目索引
        let longPressTimer = null;   // 长按定时器

        // --- Cookie 读写工具 ---
        function setCookie(name, value, days = 30) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + d.toUTCString();
            document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) == 0) {
                    try {
                        return JSON.parse(decodeURIComponent(c.substring(nameEQ.length, c.length)));
                    } catch (e) {
                        return null;
                    }
                }
            }
            return null;
        }

        // --- 状态同步与初始化 ---
        window.onload = function() {
            const savedState = getCookie("grading_app_state");
            if (savedState) {
                state = savedState;
                // 反显配置到输入框
                document.getElementById("input-total-score").value = state.totalScore;
                document.getElementById("input-question-count").value = state.questionCount;
                document.getElementById("input-deductions").value = state.deductionOptions.join(", ");
                renderDetailList();
                if (state.isConfigured) {
                    switchView(true);
                }
            } else {
                updateQuestionArray();
            }
        };

        function saveState() {
            setCookie("grading_app_state", state);
        }

        // 解析并刷新扣分快捷键
        function parseShortcuts() {
            const rawStr = document.getElementById("input-deductions").value;
            let parsed = rawStr.split(',').map(v => parseFloat(v.trim())).filter(v => !isNaN(v));
            if (parsed.length === 0) parsed = [0.5, 1.0, 2.0, 5.0];
            state.deductionOptions = parsed;

            // 重设所有题目的快捷扣分状态位长度
            state.questions.forEach(q => {
                if (q.deductionStates.length !== parsed.length) {
                    q.deductionStates = new Array(parsed.length).fill(false);
                }
            });
            saveState();
        }

        // 根据总题数动态生成/裁剪数据
        function updateQuestionArray() {
            const total = parseFloat(document.getElementById("input-total-score").value) || 100;
            const count = parseInt(document.getElementById("input-question-count").value) || 0;
            
            state.totalScore = total;
            state.questionCount = count;

            if (count <= 0) {
                state.questions = [];
                renderDetailList();
                saveState();
                return;
            }

            const defaultVal = (total / count).toFixed(1);

            if (state.questions.length < count) {
                const currentLen = state.questions.length;
                for (let i = currentLen + 1; i <= count; i++) {
                    state.questions.push({
                        number: i,
                        maxScore: defaultVal,
                        isFullyDeducted: false,
                        deductionStates: new Array(state.deductionOptions.length).fill(false),
                        customDeduction: 0.0
                    });
                }
            } else if (state.questions.length > count) {
                state.questions = state.questions.slice(0, count);
            }
            
            renderDetailList();
            saveState();
        }

        // 渲染右侧分值明细表
        function renderDetailList() {
            const container = document.getElementById("detail-list");
            container.innerHTML = "";
            state.questions.forEach((q, index) => {
                const row = document.createElement("div");
                row.className = "flex justify-between items-center bg-white p-2 rounded-lg border text-sm";
                row.innerHTML = `
                    <span class="font-medium text-gray-600">第 ${q.number} 题</span>
                    <div class="flex items-center space-x-1">
                        <span class="text-xs text-gray-400">分值:</span>
                        <input type="number" step="0.1" value="${q.maxScore}" 
                            class="w-16 text-right border rounded px-1 outline-none font-semibold text-blue-600"
                            onfocus="this.value=''"
                            oninput="state.questions[${index}].maxScore = this.value; saveState();">
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // 批量设置分值
        function applyBatchScore() {
            const start = parseInt(document.getElementById("batch-start").value);
            const end = parseInt(document.getElementById("batch-end").value);
            const score = parseFloat(document.getElementById("batch-score").value);

            if (isNaN(start) || !end || isNaN(score) || start > end) return;

            for (let i = start; i <= end; i++) {
                const q = state.questions.find(item => item.number === i);
                if (q) {
                    q.maxScore = score.toFixed(1);
                }
            }
            renderDetailList();
            saveState();
        }

        // --- 核心计算属性：计算单题及总分 ---
        function calculateSingleQuestion(q) {
            if (q.isFullyDeducted) return 0.0;
            const max = parseFloat(q.maxScore) || 0.0;
            let lost = 0.0;
            q.deductionStates.forEach((isActive, idx) => {
                if (isActive) lost += state.deductionOptions[idx];
            });
            lost += q.customDeduction;
            return max - lost;
        }

        function calculateRealtimeTotal() {
            let initialTotal = parseFloat(state.totalScore) || 100.0;
            let totalDeductions = 0.0;

            state.questions.forEach(q => {
                const max = parseFloat(q.maxScore) || 0.0;
                if (q.isFullyDeducted) {
                    totalDeductions += max;
                } else {
                    let lost = 0.0;
                    q.deductionStates.forEach((isActive, idx) => {
                        if (isActive) lost += state.deductionOptions[idx];
                    });
                    lost += q.customDeduction;
                    totalDeductions += lost;
                }
            });
            return initialTotal - totalDeductions;
        }

        // --- 视图切换与网格渲染 ---
        function switchView(toGrading) {
            state.isConfigured = toGrading;
            saveState();
            
            if (toGrading) {
                document.getElementById("config-view").classList.add("hidden");
                document.getElementById("grading-view").classList.remove("hidden");
                renderGradingGrid();
            } else {
                document.getElementById("grading-view").classList.add("hidden");
                document.getElementById("config-view").classList.remove("hidden");
                renderDetailList();
            }
        }

        function renderGradingGrid() {
            const container = document.getElementById("grid-container");
            container.innerHTML = "";

            state.questions.forEach((q, index) => {
                const currentScore = calculateSingleQuestion(q);
                const maxScore = parseFloat(q.maxScore) || 0.0;

                // 决定状态颜色
                let bgClass = "bg-white border-gray-300 text-gray-800";
                if (q.isFullyDeducted || currentScore === 0) {
                    bgClass = "bg-red-50 border-red-400 text-red-600";
                } else if (currentScore < 0) {
                    bgClass = "bg-purple-50 border-purple-400 text-purple-600";
                } else if (currentScore < maxScore) {
                    bgClass = "bg-orange-50 border-orange-400 text-orange-600";
                }

                const cell = document.createElement("div");
                cell.className = `grid-cell flex flex-col justify-center items-center h-20 rounded-xl border-2 shadow-sm active:scale-95 transition-all text-center cursor-pointer ${bgClass}`;
                cell.innerHTML = `
                    <div class="text-xl font-bold font-mono">${q.number}</div>
                    <div class="text-[10px] font-semibold font-mono tracking-tighter mt-0.5">${currentScore.toFixed(1)} / ${maxScore.toFixed(1)}</div>
                `;

                // --- 兼容手机端的长按与点击组合事件机制 ---
                let isLongPress = false;
                
                // 拦截标准移动端长按上下文菜单
                cell.addEventListener('contextmenu', e => e.preventDefault());

                function triggerStart() {
                    isLongPress = false;
                    longPressTimer = setTimeout(() => {
                        isLongPress = true;
                        openAdjustModal(index);
                    }, 500); // 500毫秒判断为长按
                }

                function triggerEnd(e) {
                    clearTimeout(longPressTimer);
                    if (!isLongPress) {
                        // 如果不是长按，则执行标准的轻点逻辑
                        handleCellTap(index);
                    }
                }

                // 同时支持触屏手势和鼠标点击
                cell.addEventListener('touchstart', (e) => { triggerStart(); });
                cell.addEventListener('touchend', (e) => { e.preventDefault(); triggerEnd(); });
                cell.addEventListener('mousedown', () => { triggerStart(); });
                cell.addEventListener('mouseup', () => { triggerEnd(); });

                container.appendChild(cell);
            });

            // 刷新顶部大分屏看板
            const totalScoreNum = calculateRealtimeTotal();
            const displayScoreElement = document.getElementById("display-current-score");
            displayScoreElement.innerText = totalScoreNum.toFixed(1);
            document.getElementById("display-total-score").innerText = `/ ${state.totalScore}`;

            if (totalScoreNum < 0 || totalScoreNum < state.totalScore * 0.6) {
                displayScoreElement.className = "text-4xl font-bold text-red-500 font-mono";
            } else {
                displayScoreElement.className = "text-4xl font-bold text-gray-900 font-mono";
            }
        }

        // 轻点处理：全分与零分一键倒转
        function handleCellTap(index) {
            let q = state.questions[index];
            const max = parseFloat(q.maxScore) || 0.0;
            const current = calculateSingleQuestion(q);

            if (current === max) {
                // 原来是满分 -> 一键扣光
                q.isFullyDeducted = true;
                q.customDeduction = 0.0;
                q.deductionStates.fill(false);
            } else {
                // 原来有扣分 -> 恢复满分
                q.isFullyDeducted = false;
                q.customDeduction = 0.0;
                q.deductionStates.fill(false);
            }
            saveState();
            renderGradingGrid();
        }

        // --- 5. 弹窗微调层交互逻辑 ---
        function openAdjustModal(index) {
            activeModalIndex = index;
            let q = state.questions[index];
            document.getElementById("modal-title").innerText = `第 ${q.number} 题 精细化微调`;
            document.getElementById("modal-custom-input").value = q.customDeduction > 0 ? q.customDeduction : "";

            // 渲染弹窗中的快捷扣分选项
            const shortcutContainer = document.getElementById("modal-shortcuts");
            shortcutContainer.innerHTML = "";
            
            state.deductionOptions.forEach((val, dIdx) => {
                const isActive = q.deductionStates[dIdx];
                const btn = document.createElement("button");
                btn.className = `py-2 text-sm font-mono font-bold rounded-lg border transition ${
                    isActive 
                    ? "bg-red-500 border-red-600 text-white shadow-inner" 
                    : "bg-gray-50 border-gray-200 text-gray-700 active:bg-gray-100"
                }`;
                btn.innerText = `-${val.toFixed(1)} ${isActive ? '✓' : ''}`;
                btn.onclick = function() {
                    q.isFullyDeducted = false;
                    q.deductionStates[dIdx] = !q.deductionStates[dIdx];
                    saveState();
                    openAdjustModal(index); // 局部刷新保持状态同步
                    renderGradingGrid();
                };
                shortcutContainer.appendChild(btn);
            });

            const modal = document.getElementById("adjust-modal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function closeModal() {
            document.getElementById("adjust-modal").classList.add("hidden");
            document.getElementById("adjust-modal").classList.remove("flex");
            activeModalIndex = null;
        }

        // 应用输入框内的自定义扣分
        function applyCustomDeduction() {
            if (activeModalIndex === null) return;
            const val = parseFloat(document.getElementById("modal-custom-input").value) || 0;
            state.questions[activeModalIndex].isFullyDeducted = false;
            state.questions[activeModalIndex].customDeduction = val;
            saveState();
            renderGradingGrid();
            closeModal();
        }

        // 弹窗内一键清空该题
        function clearSingleQuestion() {
            if (activeModalIndex === null) return;
            let q = state.questions[activeModalIndex];
            q.isFullyDeducted = false;
            q.customDeduction = 0.0;
            q.deductionStates.fill(false);
            saveState();
            renderGradingGrid();
            closeModal();
        }

        // 全局重置计分板进度
        function resetAllGrading() {
            if (confirm("确定要清空当前所有题目的扣分记录吗？")) {
                state.questions.forEach(q => {
                    q.isFullyDeducted = false;
                    q.customDeduction = 0.0;
                    q.deductionStates.fill(false);
                });
                saveState();
                renderGradingGrid();
            }
        }
    </script>
</body>
</html>
